# This rule is not used by the project odoo-k8-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the odoo.odoo.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: odoo-k8-operator
    app.kubernetes.io/managed-by: kustomize
  name: odooinstance-editor-role
rules:
- apiGroups:
  - odoo.odoo.io
  resources:
  - odooinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - odoo.odoo.io
  resources:
  - odooinstances/status
  verbs:
  - get
