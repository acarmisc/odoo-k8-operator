apiVersion: odoo.operator.io/v1
kind: OdooInstance
metadata:
  name: crm
  namespace: odoo-crm
spec:
  image: odoo:17.0
  replicas: 1
  addonsVolume:
    size: 1Gi
    storageClass: standard
  postgres:
    host: ces-dev-db-03
    port: 5432
    database: odoo_crm
    user: odoo_admin
    passwordSecret: odoo-db-secret
  config:
    limit_time_real: "120"
